<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="100%">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0025"/>
      <stop offset="45%" stop-color="#2D0860"/>
      <stop offset="75%" stop-color="#450A8A"/>
      <stop offset="100%" stop-color="#150035"/>
    </linearGradient>
    <radialGradient id="gCenter" cx="50%" cy="50%" r="38%">
      <stop offset="0%" stop-color="#9B40FF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#9B40FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gTop" cx="50%" cy="5%" r="55%">
      <stop offset="0%" stop-color="#FF80D5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF80D5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gLeft" cx="10%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#6030CC" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6030CC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gRight" cx="90%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#CC30AA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#CC30AA" stop-opacity="0"/>
    </radialGradient>
    <filter id="tg" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b2"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pg" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes fall{from{transform:translateY(-10px);opacity:0}5%{opacity:1}88%{opacity:.85}to{transform:translateY(312px);opacity:0}}
      @keyframes twk{0%,100%{opacity:.1}50%{opacity:.95}}
      @keyframes streak{from{transform:translateY(-60px);opacity:0}8%{opacity:.6}85%{opacity:.4}to{transform:translateY(320px);opacity:0}}
      .p{animation:fall linear infinite}
      .s{animation:twk ease-in-out infinite}
      .st{animation:streak linear infinite}
    </style>
  </defs>
